<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Support Receipt</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f4f7;
        margin: 0;
        padding: 0;
    }

    .receipt {
        max-width: 650px;
        margin: 40px auto;
        background: #ffffff;
        border: 1px solid #ddd;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* HEADER */
    .header {
        background-color: #1f4fd8;
        color: #ffffff;
        padding: 20px;
        text-align: center;
    }

    .header h1 {
        margin: 0;
        font-size: 26px;
        letter-spacing: 1px;
    }

    .header p {
        margin: 5px 0 0;
        font-size: 14px;
    }

    /* CONTENT */
    .content {
        padding: 30px;
    }

    .section {
        margin-bottom: 25px;
    }

    .section-title {
        font-weight: bold;
        color: #1f4fd8;
        margin-bottom: 10px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 5px;
    }

    label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
    }

    input, textarea {
        width: 100%;
        padding: 8px;
        font-size: 14px;
        border: 1px solid #bbb;
        border-radius: 4px;
        margin-bottom: 10px;
        box-sizing: border-box;
    }

    textarea {
        resize: none;
        height: 80px;
    }

    .row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
    }

    .row .half {
        width: 50%;
    }

    .amount-box {
        background-color: #f5f7ff;
        padding: 15px;
        border: 1px solid #c7d2ff;
        font-size: 18px;
        font-weight: bold;
        text-align: right;
    }

    .signature {
        margin-top: 40px;
    }

    .signature-line {
        border-top: 1px solid #333;
        width: 250px;
        margin-top: 10px;
    }

    .print-btn {
        display: block;
        width: 220px;
        margin: 20px auto 30px;
        padding: 12px;
        font-size: 16px;
        background-color: #1f4fd8;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .print-btn:hover {
        background-color: #163bb0;
    }

    @media print {
        body {
            background: none;
        }
        .print-btn {
            display: none;
        }
        .receipt {
            box-shadow: none;
            border: none;
            margin: 0;
        }
    }
</style>
</head>

<body>

<div class="receipt">

    <!-- HEADER -->
    <div class="header">
        <h1>IT Support Receipt</h1>
        <p>Computer • Wi-Fi • Smartphone Support</p>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="section">
            <div class="section-title">Service Provider</div>

            <label>Name</label>
            <input type="text" value="Hashmatullah Bahadari">

            <label>Address</label>
            <input type="text" value="Schonbecker Straße 38">
        </div>

        <div class="section">
            <div class="section-title">Client Information</div>

            <label>Client Name</label>
            <input type="text">

            <label>Client Address (optional)</label>
            <input type="text">
        </div>

        <div class="section">
            <div class="section-title">Service Details</div>

            <div class="row">
                <div class="half">
                    <label>Date of Service</label>
                    <input type="date">
                </div>
            </div>

            <label>Description of Service</label>
            <textarea placeholder="e.g. Computer repair, Wi-Fi setup, software installation"></textarea>
        </div>

        <div class="section">
            <div class="section-title">Payment</div>

            <div class="amount-box">
                Amount Received: € <input type="text" placeholder="cash">
            </div>
        </div>

        <div class="signature">
            Signature
            <div class="signature-line"></div>
        </div>

    </div>
</div>

<button class="print-btn" onclick="window.print()">Print as PDF</button>

</body>
</html>
