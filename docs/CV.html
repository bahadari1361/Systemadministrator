<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder - Create Your Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0B1120 0%, #1A2332 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #60A5FA 0%, #A78BFA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .header p {
            color: #94A3B8;
            font-size: 18px;
        }

        /* Builder Layout */
        .builder-wrapper {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 24px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Left Panel - Editor */
        .editor-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 24px;
            height: fit-content;
            max-height: 900px;
            overflow-y: auto;
        }

        .panel-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title span {
            background: #3B82F6;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: white;
        }

        .section-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .section-icon {
            width: 32px;
            height: 32px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #60A5FA;
            font-size: 18px;
        }

        .section-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            color: #94A3B8;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #3B82F6;
            background: rgba(59, 130, 246, 0.1);
        }

        .input-field::placeholder {
            color: #4A5568;
        }

        textarea.input-field {
            min-height: 80px;
            resize: vertical;
        }

        .skill-item {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }

        .skill-name {
            flex: 2;
        }

        .skill-level {
            flex: 1;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
        }

        .btn-add {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-remove {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #EF4444;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-remove:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        /* Right Panel - Preview */
        .preview-panel {
            background: white;
            border-radius: 24px;
            padding: 40px;
            overflow-y: auto;
            max-height: 900px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .cv-preview {
            max-width: 700px;
            margin: 0 auto;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* CV Preview Styles */
        .cv-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #f0f0f0;
        }

        .cv-photo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        .cv-header-info h1 {
            font-size: 32px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .cv-title {
            font-size: 18px;
            color: #3B82F6;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .cv-contact {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            color: #666;
            font-size: 14px;
        }

        .cv-contact span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .cv-section {
            margin-bottom: 25px;
        }

        .cv-section-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #3B82F6;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }

        .cv-job {
            margin-bottom: 20px;
        }

        .cv-job-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 5px;
        }

        .cv-job-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .cv-job-date {
            color: #666;
            font-size: 14px;
        }

        .cv-job-company {
            color: #3B82F6;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .cv-job-desc {
            list-style: none;
            font-size: 14px;
            color: #444;
            line-height: 1.6;
        }

        .cv-job-desc li {
            margin-bottom: 5px;
            padding-left: 18px;
            position: relative;
        }

        .cv-job-desc li:before {
            content: "•";
            color: #3B82F6;
            font-weight: bold;
            position: absolute;
            left: 5px;
        }

        .cv-skills-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .cv-skill-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 14px;
        }

        .cv-skill-name {
            font-weight: 600;
            color: #1a1a1a;
        }

        .cv-skill-stars {
            color: #FFB800;
            letter-spacing: 2px;
        }

        .cv-language-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
            font-size: 14px;
        }

        .cv-language-name {
            font-weight: 600;
        }

        .cv-language-level {
            color: #666;
        }

        .cv-education-item {
            margin-bottom: 15px;
        }

        .cv-education-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .cv-education-school {
            color: #3B82F6;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .cv-education-date {
            color: #666;
            font-size: 13px;
        }

        .export-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
            transition: all 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .export-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Modern CV Builder</h1>
            <p>Build your professional resume in minutes</p>
        </div>

        <div class="builder-wrapper">
            <!-- Left Panel - Editor -->
            <div class="editor-panel">
                <div class="panel-title">
                    📝 Editor
                    <span>Live Preview</span>
                </div>

                <!-- Personal Info -->
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-icon">👤</div>
                        <div class="section-title">Personal Information</div>
                    </div>
                    
                    <div class="input-group">
                        <label class="input-label">Full Name</label>
                        <input type="text" class="input-field" id="nameInput" value="Hashmat Bahadari" placeholder="Your full name">
                    </div>

                    <div class="input-group">
                        <label class="input-label">Professional Title</label>
                        <input type="text" class="input-field" id="titleInput" value="IT-Support Engineer" placeholder="e.g., IT Support Engineer">
                    </div>

                    <div class="input-group">
                        <label class="input-label">Address</label>
                        <input type="text" class="input-field" id="addressInput" value="Schönebecker Straße 38, 28759 Bremen" placeholder="Your address">
                    </div>

                    <div class="input-group">
                        <label class="input-label">Phone</label>
                        <input type="text" class="input-field" id="phoneInput" value="+49 176 266 36 133" placeholder="Phone number">
                    </div>

                    <div class="input-group">
                        <label class="input-label">Email</label>
                        <input type="email" class="input-field" id="emailInput" value="hashmat.bahadari@icloud.com" placeholder="Email address">
                    </div>

                    <div class="input-group">
                        <label class="input-label">LinkedIn</label>
                        <input type="text" class="input-field" id="linkedinInput" value="linkedin.com/in/bahadari" placeholder="LinkedIn URL">
                    </div>
                </div>

                <!-- Profile -->
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-icon">📋</div>
                        <div class="section-title">Profile Summary</div>
                    </div>
                    
                    <div class="input-group">
                        <textarea class="input-field" id="profileInput" rows="4">IT-Support Engineer mit über 6 Jahren Erfahrung im First- und Second-Level-Support sowie in der Systemadministration. Sehr gute Kenntnisse in Windows-Umgebungen, Active Directory und Microsoft 365. Seit 2022 in Deutschland mit Fokus auf Deutschlernen (B1).</textarea>
                    </div>
                </div>

                <!-- Work Experience -->
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-icon">💼</div>
                        <div class="section-title">Work Experience</div>
                    </div>
                    
                    <div id="jobsContainer">
                        <!-- Jobs will be added here -->
                    </div>
                    
                    <button class="btn-add" onclick="addJob()">
                        ➕ Add Work Experience
                    </button>
                </div>

                <!-- Education -->
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-icon">🎓</div>
                        <div class="section-title">Education</div>
                    </div>
                    
                    <div id="educationContainer">
                        <!-- Education will be added here -->
                    </div>
                    
                    <button class="btn-add" onclick="addEducation()">
                        ➕ Add Education
                    </button>
                </div>

                <!-- Skills -->
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-icon">⚡</div>
                        <div class="section-title">Skills</div>
                    </div>
                    
                    <div id="skillsContainer">
                        <!-- Skills will be added here -->
                    </div>
                    
                    <button class="btn-add" onclick="addSkill()">
                        ➕ Add Skill
                    </button>
                </div>

                <!-- Languages -->
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-icon">🌍</div>
                        <div class="section-title">Languages</div>
                    </div>
                    
                    <div id="languagesContainer">
                        <!-- Languages will be added here -->
                    </div>
                    
                    <button class="btn-add" onclick="addLanguage()">
                        ➕ Add Language
                    </button>
                </div>
            </div>

            <!-- Right Panel - Preview -->
            <div class="preview-panel">
                <div class="cv-preview" id="cvPreview">
                    <!-- CV Preview will be generated here -->
                </div>
            </div>
        </div>
    </div>

    <button class="export-btn" onclick="exportPDF()">
        📥 Download CV as PDF
    </button>

    <script>
        // Data arrays
        let jobs = [];
        let education = [];
        let skills = [];
        let languages = [];

        // Initialize with sample data
        function initializeData() {
            // Add sample job
            jobs.push({
                title: "IT-SUPPORT ENGINEER",
                company: "Selbstständig",
                location: "Bremen",
                startDate: "Okt. 2022",
                endDate: "Gegenwärtig",
                description: "Beratung und Planung der IT-Infrastruktur für KMU\nEinführung und Migration zu Microsoft 365\nAufbau von IT-Support-Prozessen\nRemote-Support via TeamViewer und AnyDesk"
            });

            jobs.push({
                title: "SYSTEMADMINISTRATOR",
                company: "Zentralbank von Afghanistan",
                location: "Kabul",
                startDate: "Nov. 2014",
                endDate: "Sep. 2021",
                description: "First- und Second-Level-Support für 2.500+ Mitarbeiter\nVerwaltung von Active Directory\nHelpdesk-Tickets mit 92% Lösungsquote\nFirewall-Konfiguration (Fortinet)"
            });

            // Add sample education
            education.push({
                degree: "Bachelor of Science in Informatik",
                school: "Maiwand University",
                location: "Kabul, Afghanistan",
                startDate: "Sep. 2010",
                endDate: "Sep. 2014",
                description: "Schwerpunkt: Netzwerke und IT-Infrastruktur\nZAB-anerkannt"
            });

            // Add sample skills
            skills.push({ name: "IT-SUPPORT", level: 5 });
            skills.push({ name: "HARDWARE-FEHLERBEHEBUNG", level: 5 });
            skills.push({ name: "SOFTWARE-FEHLERBEHEBUNG", level: 5 });
            skills.push({ name: "WINDOWS 10/11", level: 5 });
            skills.push({ name: "MICROSOFT 365", level: 5 });
            skills.push({ name: "ACTIVE DIRECTORY", level: 5 });

            // Add sample languages
            languages.push({ name: "Persisch", level: "Muttersprache (C2)" });
            languages.push({ name: "Englisch", level: "Fließend (C1)" });
            languages.push({ name: "Deutsch", level: "Gute Grundkenntnisse (B1)" });

            renderAll();
        }

        // Render functions
        function renderJobs() {
            const container = document.getElementById('jobsContainer');
            container.innerHTML = '';
            
            jobs.forEach((job, index) => {
                container.innerHTML += `
                    <div style="margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 12px;">
                        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                            <input type="text" class="input-field" style="flex:2;" value="${job.title}" placeholder="Job Title" onchange="updateJob(${index}, 'title', this.value)">
                            <input type="text" class="input-field" style="flex:1;" value="${job.company}" placeholder="Company" onchange="updateJob(${index}, 'company', this.value)">
                        </div>
                        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                            <input type="text" class="input-field" value="${job.location}" placeholder="Location" onchange="updateJob(${index}, 'location', this.value)">
                            <input type="text" class="input-field" value="${job.startDate}" placeholder="Start Date" onchange="updateJob(${index}, 'startDate', this.value)">
                            <input type="text" class="input-field" value="${job.endDate}" placeholder="End Date" onchange="updateJob(${index}, 'endDate', this.value)">
                        </div>
                        <textarea class="input-field" rows="3" placeholder="Description (one per line)" onchange="updateJob(${index}, 'description', this.value)">${job.description}</textarea>
                        <button class="btn-remove" style="margin-top: 10px;" onclick="removeJob(${index})">Remove</button>
                    </div>
                `;
            });
        }

        function renderEducation() {
            const container = document.getElementById('educationContainer');
            container.innerHTML = '';
            
            education.forEach((edu, index) => {
                container.innerHTML += `
                    <div style="margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 12px;">
                        <input type="text" class="input-field" style="margin-bottom: 10px;" value="${edu.degree}" placeholder="Degree" onchange="updateEducation(${index}, 'degree', this.value)">
                        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                            <input type="text" class="input-field" style="flex:2;" value="${edu.school}" placeholder="School" onchange="updateEducation(${index}, 'school', this.value)">
                            <input type="text" class="input-field" style="flex:1;" value="${edu.location}" placeholder="Location" onchange="updateEducation(${index}, 'location', this.value)">
                        </div>
                        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                            <input type="text" class="input-field" value="${edu.startDate}" placeholder="Start Date" onchange="updateEducation(${index}, 'startDate', this.value)">
                            <input type="text" class="input-field" value="${edu.endDate}" placeholder="End Date" onchange="updateEducation(${index}, 'endDate', this.value)">
                        </div>
                        <textarea class="input-field" rows="2" placeholder="Description" onchange="updateEducation(${index}, 'description', this.value)">${edu.description}</textarea>
                        <button class="btn-remove" style="margin-top: 10px;" onclick="removeEducation(${index})">Remove</button>
                    </div>
                `;
            });
        }

        function renderSkills() {
            const container = document.getElementById('skillsContainer');
            container.innerHTML = '';
            
            skills.forEach((skill, index) => {
                container.innerHTML += `
                    <div class="skill-item">
                        <input type="text" class="input-field skill-name" value="${skill.name}" placeholder="Skill name" onchange="updateSkill(${index}, 'name', this.value)">
                        <select class="skill-level" onchange="updateSkill(${index}, 'level', this.value)">
                            <option value="1" ${skill.level == 1 ? 'selected' : ''}>★</option>
                            <option value="2" ${skill.level == 2 ? 'selected' : ''}>★★</option>
                            <option value="3" ${skill.level == 3 ? 'selected' : ''}>★★★</option>
                            <option value="4" ${skill.level == 4 ? 'selected' : ''}>★★★★</option>
                            <option value="5" ${skill.level == 5 ? 'selected' : ''}>★★★★★</option>
                        </select>
                        <button class="btn-remove" onclick="removeSkill(${index})">✕</button>
                    </div>
                `;
            });
        }

        function renderLanguages() {
            const container = document.getElementById('languagesContainer');
            container.innerHTML = '';
            
            languages.forEach((lang, index) => {
                container.innerHTML += `
                    <div class="skill-item">
                        <input type="text" class="input-field skill-name" value="${lang.name}" placeholder="Language" onchange="updateLanguage(${index}, 'name', this.value)">
                        <input type="text" class="input-field skill-level" value="${lang.level}" placeholder="Level" onchange="updateLanguage(${index}, 'level', this.value)">
                        <button class="btn-remove" onclick="removeLanguage(${index})">✕</button>
                    </div>
                `;
            });
        }

        function renderCVPreview() {
            const name = document.getElementById('nameInput').value || 'Your Name';
            const title = document.getElementById('titleInput').value || 'Professional Title';
            const address = document.getElementById('addressInput').value || '';
            const phone = document.getElementById('phoneInput').value || '';
            const email = document.getElementById('emailInput').value || '';
            const linkedin = document.getElementById('linkedinInput').value || '';
            const profile = document.getElementById('profileInput').value || '';

            let preview = `
                <div class="cv-header">
                    <div class="cv-photo">${name.charAt(0)}</div>
                    <div class="cv-header-info">
                        <h1>${name}</h1>
                        <div class="cv-title">${title}</div>
                        <div class="cv-contact">
                            <span>📍 ${address}</span>
                            <span>📞 ${phone}</span>
                            <span>✉️ ${email}</span>
                            <span>🔗 ${linkedin}</span>
                        </div>
                    </div>
                </div>

                <div class="cv-section">
                    <div class="cv-section-title">Profile</div>
                    <p style="font-size: 14px; line-height: 1.6; color: #444;">${profile}</p>
                </div>

                <div class="cv-section">
                    <div class="cv-section-title">Work Experience</div>
                    ${jobs.map(job => `
                        <div class="cv-job">
                            <div class="cv-job-header">
                                <span class="cv-job-title">${job.title}</span>
                                <span class="cv-job-date">${job.startDate} – ${job.endDate}</span>
                            </div>
                            <div class="cv-job-company">${job.company} | ${job.location}</div>
                            <ul class="cv-job-desc">
                                ${job.description.split('\n').map(line => `<li>${line}</li>`).join('')}
                            </ul>
                        </div>
                    `).join('')}
                </div>

                <div class="cv-section">
                    <div class="cv-section-title">Education</div>
                    ${education.map(edu => `
                        <div class="cv-education-item">
                            <div class="cv-education-title">${edu.degree}</div>
                            <div class="cv-education-school">${edu.school} | ${edu.location}</div>
                            <div class="cv-education-date">${edu.startDate} – ${edu.endDate}</div>
                            <p style="font-size: 13px; color: #666; margin-top: 5px;">${edu.description}</p>
                        </div>
                    `).join('')}
                </div>

                <div class="cv-section">
                    <div class="cv-section-title">Skills</div>
                    <div class="cv-skills-grid">
                        ${skills.map(skill => `
                            <div class="cv-skill-item">
                                <span class="cv-skill-name">${skill.name}</span>
                                <span class="cv-skill-stars">${'★'.repeat(skill.level)}${'☆'.repeat(5-skill.level)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="cv-section">
                    <div class="cv-section-title">Languages</div>
                    ${languages.map(lang => `
                        <div class="cv-language-item">
                            <span class="cv-language-name">${lang.name}</span>
                            <span class="cv-language-level">${lang.level}</span>
                        </div>
                    `).join('')}
                </div>
            `;

            document.getElementById('cvPreview').innerHTML = preview;
        }

        function renderAll() {
            renderJobs();
            renderEducation();
            renderSkills();
            renderLanguages();
            renderCVPreview();
        }

        // Add functions
        function addJob() {
            jobs.push({
                title: "New Position",
                company: "Company Name",
                location: "Location",
                startDate: "Start Date",
                endDate: "End Date",
                description: "Description line 1\nDescription line 2"
            });
            renderAll();
        }

        function addEducation() {
            education.push({
                degree: "New Degree",
                school: "School Name",
                location: "Location",
                startDate: "Start Date",
                endDate: "End Date",
                description: "Description"
            });
            renderAll();
        }

        function addSkill() {
            skills.push({ name: "New Skill", level: 3 });
            renderAll();
        }

        function addLanguage() {
            languages.push({ name: "New Language", level: "Level" });
            renderAll();
        }

        // Update functions
        function updateJob(index, field, value) {
            jobs[index][field] = value;
            renderCVPreview();
        }

        function updateEducation(index, field, value) {
            education[index][field] = value;
            renderCVPreview();
        }

        function updateSkill(index, field, value) {
            if (field === 'level') value = parseInt(value);
            skills[index][field] = value;
            renderCVPreview();
        }

        function updateLanguage(index, field, value) {
            languages[index][field] = value;
            renderCVPreview();
        }

        // Remove functions
        function removeJob(index) {
            jobs.splice(index, 1);
            renderAll();
        }

        function removeEducation(index) {
            education.splice(index, 1);
            renderAll();
        }

        function removeSkill(index) {
            skills.splice(index, 1);
            renderAll();
        }

        function removeLanguage(index) {
            languages.splice(index, 1);
            renderAll();
        }

        // Export function
        function exportPDF() {
            alert('In a real app, this would download your CV as PDF. For GitHub Pages, you can use the browser Print function (Ctrl+P) and "Save as PDF".');
            
            // Alternative: Open print dialog for PDF
            window.print();
        }

        // Initialize
        initializeData();

        // Add input listeners for real-time preview
        document.getElementById('nameInput').addEventListener('input', renderCVPreview);
        document.getElementById('titleInput').addEventListener('input', renderCVPreview);
        document.getElementById('addressInput').addEventListener('input', renderCVPreview);
        document.getElementById('phoneInput').addEventListener('input', renderCVPreview);
        document.getElementById('emailInput').addEventListener('input', renderCVPreview);
        document.getElementById('linkedinInput').addEventListener('input', renderCVPreview);
        document.getElementById('profileInput').addEventListener('input', renderCVPreview);
    </script>
</body>
</html>
